name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build · Test · Demo Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build workspace
        run: cargo build --workspace

      # ── Unit + integration tests ─────────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace

      # ── Canonical demo smoke (live service) ──────────────────────────────────
      - name: Start postcad-service
        run: |
          ./target/debug/postcad-service &
          echo "SVC_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for service health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Service ready (attempt ${i})"
              exit 0
            fi
            sleep 1
          done
          echo "Service did not become ready within 20s" >&2
          exit 1

      - name: Run canonical pilot demo
        run: ./examples/pilot/demo.sh

      - name: Assert export packet is present and correct
        run: |
          [[ -f examples/pilot/export_packet.json ]] \
            || { echo "export_packet.json was not generated by demo.sh" >&2; exit 1; }
          python3 - <<'EOF'
          import json, sys
          d = json.load(open("examples/pilot/export_packet.json"))
          EXPECTED_HASH = "0db54077cff0fbc45d22eff7323f5d49497fcac1a74d2d3955c00f0a9044bcfb"
          errors = []
          if d.get("status") != "exported":
              errors.append(f"status={d.get('status')!r}, want 'exported'")
          if d.get("receipt_hash") != EXPECTED_HASH:
              errors.append(f"receipt_hash={d.get('receipt_hash')!r}, want {EXPECTED_HASH!r}")
          if d.get("selected_candidate_id") != "pilot-de-001":
              errors.append(f"selected_candidate_id={d.get('selected_candidate_id')!r}, want 'pilot-de-001'")
          if d.get("verification_passed") is not True:
              errors.append(f"verification_passed={d.get('verification_passed')!r}, want true")
          if errors:
              for e in errors: print(f"  FAIL: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"  export packet OK: receipt_hash={d['receipt_hash']}")
          EOF

      - name: Stop service
        if: always()
        run: kill "$SVC_PID" 2>/dev/null || true
